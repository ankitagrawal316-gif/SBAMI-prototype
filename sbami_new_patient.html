function Card({ tone = "neutral", onClick, children, style }) {
  const tn = toneMap[tone];
  return (
    <div onClick={onClick} style={{
      background: tn.bg, borderRadius: RAD, padding: 18,
      boxShadow: "0 2px 12px rgba(38,70,83,0.06)",
      borderLeft: tn.br ? `3px solid ${tn.br}` : "none",
      cursor: onClick ? "pointer" : "default", ...style,
    }}>{children}</div>
  );
}
function AccentBtn({ children, onClick, disabled, reason }) {
  return (
    <div style={{ width: "100%" }}>
      <button onClick={onClick} disabled={disabled} style={{
        width: "100%", minHeight: 52, borderRadius: RAD, border: "none",
        background: disabled ? T.sunken : T.accent, color: disabled ? T.fgSubtle : T.fg,

  );
}

}
function Pill({ children, tone = "neutral" }) {

  return <span style={{ background: tn.bg, color: tn.br || T.fgMuted, borderRadius: 999, padding: "3px 10px", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap" }}>{children}</span>;

function Label({ children }) {
  return <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: 0.5, color: T.fgMuted, textTransform: "uppercase", marginBottom: 8 }}>{children}</div>;
}
function Field({ label, value, onChange, placeholder, numeric, note }) {
  return (
    <div style={{ marginBottom: 12 }}>
      {label && <div style={{ fontSize: 13, color: T.fgMuted, marginBottom: 6, fontWeight: 500 }}>{label}</div>}
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        inputMode={numeric ? "numeric" : "text"}
        style={{ width: "100%", minHeight: 50, borderRadius: RAD, border: "none", background: T.sunken,
          padding: "0 14px", fontSize: 15, color: T.fg, fontFamily: "inherit", boxSizing: "border-box" }} />
      {note && <div style={{ fontSize: 12, color: T.fgSubtle, marginTop: 5 }}>{note}</div>}
    </div>
  );
}

/* ---------- stepper (no bubble, active = teal bold + coral underline) ---------- */
function Stepper({ step }) {
  const steps = ["Tests", "Date & Address", "Review"];
  return (
    <div style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "4px 0 14px" }}>
      {steps.map((s, i) => {
        const active = i === step, done = i < step;
        return (
          <React.Fragment key={s}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: active ? 600 : 400,
                color: active ? T.brandDeep : done ? T.fgMuted : T.fgSubtle }}>
                {done ? "✓ " : `${i + 1}. `}{s}
              </div>
              {active && <div style={{ height: 3, background: T.accent, borderRadius: 2, marginTop: 4 }} />}
            </div>
            {i < steps.length - 1 && <div style={{ color: T.fgSubtle, fontSize: 13 }}>/</div>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* ======================= TEST SELECT ======================= */
function TestSelect({ step, patient, cart, setCart, onContinue }) {
  const [q, setQ] = useState(""); const [cat, setCat] = useState("Popular");
  const [showSheet, setShowSheet] = useState(false);
  const [rxUpload, setRxUpload] = useState(null); // 'photo' | 'gallery' | null
  const rxTests = useMemo(() => prescribedFor(patient), [patient]);
  const hasRx = rxTests.length > 0;
  const [showManual, setShowManual] = useState(!hasRx); // open by default when no Rx
  const filtered = CATALOGUE.filter((x) =>
    (q ? (x.en.toLowerCase().includes(q.toLowerCase()) || x.hi.includes(q)) : x.cat === cat));
  const total = cart.reduce((s, c) => s + c.price, 0);
  const inCart = (code) => cart.some((c) => c.code === code);
  const toggle = (item) => setCart(inCart(item.code) ? cart.filter((c) => c.code !== item.code) : [...cart, item]);
  const addAllRx = () => setCart([...cart.filter((c) => !rxTests.some((r) => r.code === c.code)), ...rxTests]);
  return (
    <Screen footer={
      <>
        {cart.length > 0 && (
          <div onClick={() => setShowSheet(true)} style={{ display: "flex", justifyContent: "space-between",
            cursor: "pointer", fontSize: 13, color: T.brandDeep, fontWeight: 600, marginBottom: 10 }}>
            <span>🛒 {cart.length} test{cart.length > 1 ? "s" : ""} selected</span><span style={{ ...tnum }}>{rupee(total)} · View</span>
          </div>
        )}
        <AccentBtn disabled={cart.length === 0} reason="Add at least one test" onClick={onContinue}>Continue to Date & Address</AccentBtn>
      </>
    }>
      <Stepper step={step} />

      {/* SOURCE 1 — prescription already in the system (SBAMI patients) */}
      {hasRx && (
        <Card tone="brand" style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.brandDeep }}>Your doctor's prescription</div>
            <Pill tone="brand">From SBAMI</Pill>
          </div>
          <div style={{ fontSize: 12, color: T.fgMuted, marginTop: 4, display: "flex", gap: 12, flexWrap: "wrap" }}>
            <span>📅 Prescribed <b style={{ color: T.fg }}>{patient.rxDate}</b></span>
            {patient.rxDoctor && <span>🩺 {patient.rxDoctor}</span>}
          </div>
          <div style={{ fontSize: 13, color: T.fgMuted, margin: "6px 0 10px" }}>Pick the tests you want done.</div>
          {rxTests.map((x) => (
            <div key={x.code} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: `1px solid ${T.brandSoft}` }}>
              <div>
                <div style={{ fontWeight: 600, color: T.fg, fontSize: 14 }}>{x.en}</div>
                <div style={{ fontSize: 12, color: T.fgMuted, ...tnum }}>{rupee(x.price)}{x.fasting > 0 ? ` · ${x.fasting}h fasting` : ""}</div>
              </div>
              <button onClick={() => toggle(x)} style={{ borderRadius: 999,
                background: inCart(x.code) ? T.brandDeep : T.surface, color: inCart(x.code) ? "#fff" : T.brandDeep,
                border: inCart(x.code) ? "none" : `1px solid ${T.brand}`,
                padding: "5px 14px", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                {inCart(x.code) ? "Added ✓" : "Add"}</button>
            </div>
          ))}
          <div style={{ marginTop: 10 }}><GhostBtn onClick={addAllRx}>+ Add all prescribed tests</GhostBtn></div>
        </Card>
      )}

      {/* SOURCE 2 — upload / photograph a prescription */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: T.fg }}>{hasRx ? "Have another prescription?" : "Have a prescription?"}</div>
        <div style={{ fontSize: 13, color: T.fgMuted, margin: "2px 0 10px" }}>
          {rxUpload ? "Our team will confirm the tests and price, usually within 30 minutes." : "Send us a photo or a digital copy. Our team reads it and confirms your tests."}
        </div>
        {!rxUpload ? (
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setRxUpload("photo")} style={rxBtn}>📷 Take a photo</button>
            <button onClick={() => setRxUpload("gallery")} style={rxBtn}>🖼 Upload from device</button>
          </div>
        ) : (
          <Card tone="warning" style={{ padding: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 13, color: T.fg }}>
                {rxUpload === "photo" ? "📄 Prescription photo captured" : "📄 Prescription uploaded"}<br />
                <span style={{ color: T.warning, fontWeight: 600 }}>Akash is reviewing it…</span>
              </div>
              <GhostBtn color={T.error} onClick={() => setRxUpload(null)}>Remove</GhostBtn>
            </div>
          </Card>
        )}
      </Card>

      {/* SOURCE 3 — manual selection from the catalogue */}
      <Card onClick={() => setShowManual((v) => !v)} style={{ marginBottom: showManual ? 12 : 0, cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.fg }}>Choose tests yourself</div>
            <div style={{ fontSize: 13, color: T.fgMuted }}>Search or browse the full test list</div>
          </div>
          <span style={{ color: T.fgMuted, fontSize: 18 }}>{showManual ? "▴" : "▾"}</span>
        </div>
      </Card>

      {showManual && <>
      <Field value={q} onChange={setQ} placeholder="Search — CBC, Lipid Profile, Thyroid…" />
      <div style={{ display: "flex", gap: 8, overflowX: "auto", padding: "4px 0 12px" }}>
        {CATS.map((c) => (
          <button key={c} onClick={() => { setCat(c); setQ(""); }} style={{ whiteSpace: "nowrap", borderRadius: 999,
            border: cat === c && !q ? "none" : `1px solid ${T.border}`, background: cat === c && !q ? T.brandDeep : T.surface,
            color: cat === c && !q ? "#fff" : T.fg, padding: "6px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{c}</button>
        ))}
      </div>
      {filtered.map((x) => (
        <Card key={x.code} style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, color: T.fg }}>{x.en}</div>
              <div style={{ fontSize: 12, color: T.fgMuted }}>{x.hi}</div>
              <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                <Pill>{x.vial.split(" ")[0]}</Pill>
                {x.fasting > 0 ? <Pill tone="warning">{x.fasting}h fasting</Pill> : <Pill tone="success">No fasting</Pill>}
                <Pill>Report {x.tat}h</Pill>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: 700, color: T.fg, ...tnum }}>{rupee(x.price)}</div>
              <button onClick={() => toggle(x)} style={{ marginTop: 6, borderRadius: 999, border: "none",

/* Screen: scrollable content area + optional fixed footer.

/* ======================= SCHEDULE (address + slot) ======================= */
function ScheduleScreen({ step, cart, draft, setDraft, onContinue }) {
  const [addr, setAddr] = useState(draft.address || "");
  const [landmark, setLandmark] = useState(draft.landmark || "");
  const [sugs, setSugs] = useState([]);
  const [km, setKm] = useState(draft.km || null);
  const [date, setDate] = useState(draft.date || null);
  const [slot, setSlot] = useState(draft.slot || null);
  const days = useMemo(() => nextDays(3), []);
  const total = cart.reduce((s, c) => s + c.price, 0);
  const hasFasting = cart.some((c) => c.fasting > 0);

  const onAddr = (v) => {
    setAddr(v);
    setSugs(v.length > 1 ? LOCALITIES.filter((l) => l.name.toLowerCase().includes(v.toLowerCase())).slice(0, 4) : []);
  };
  const pick = (l) => { setAddr(l.name); setKm(l.km); setSugs([]); };

  const ready = addr && landmark && date && slot;
  return (
    <Screen footer={
      <AccentBtn disabled={!ready} reason={!addr || !landmark ? "Enter address & landmark" : !date ? "Pick a date" : "Pick a time slot"}
        onClick={() => { setDraft({ ...draft, address: addr, landmark, km, date, dateLabel: date.label, slot }); onContinue(); }}>Review booking</AccentBtn>
    }>
      <Stepper step={step} />
      <Label>Where should we come?</Label>
      <div style={{ height: 150, borderRadius: RAD, background: `linear-gradient(135deg,${T.brandSoft},${T.infoSoft})`,
        display: "flex", alignItems: "center", justifyContent: "center", position: "relative", marginBottom: 10 }}>
        <span style={{ fontSize: 40 }}>📍</span>
        <button onClick={() => pick(LOCALITIES[0])} style={{ position: "absolute", bottom: 8, left: 8, background: T.surface,
          border: "none", borderRadius: RAD, padding: "6px 10px", fontSize: 12, fontWeight: 600, color: T.brandDeep, cursor: "pointer", fontFamily: "inherit" }}>
          📍 Use my current location</button>
      </div>
      <div style={{ position: "relative" }}>
        <Field value={addr} onChange={onAddr} placeholder="Type your address…" />
        {sugs.length > 0 && (
          <div style={{ position: "absolute", top: 52, left: 0, right: 0, background: T.surface, borderRadius: RAD,
            boxShadow: "0 4px 16px rgba(0,0,0,0.12)", zIndex: 10, overflow: "hidden" }}>
            {sugs.map((l) => (
              <div key={l.name} onClick={() => pick(l)} style={{ padding: "10px 14px", cursor: "pointer", fontSize: 14, color: T.fg, borderBottom: `1px solid ${T.border}` }}>
                📍 {l.name} <span style={{ color: T.fgSubtle, fontSize: 12 }}>· {l.km} km</span></div>
            ))}
          </div>
        )}
      </div>
      <Field value={landmark} onChange={setLandmark} placeholder="Landmark (required)" note="Our phlebotomist finds the house by landmark — please be specific." />
      {km != null && <div style={{ marginBottom: 10 }}><Pill tone="info">{km} km from SBAMI</Pill></div>}

      <Label>When should we come?</Label>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        {days.map((d) => (
          <button key={d.key} onClick={() => setDate(d)} style={{ flex: 1, minHeight: 52, borderRadius: RAD,
            border: date?.key === d.key ? `2px solid ${T.brandDeep}` : `1px solid ${T.border}`,
            background: date?.key === d.key ? T.brandSoft : T.surface, color: T.fg, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{d.label}</button>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        {SLOTS.map((s, i) => {
          const morning = i < 2; const full = i === 4;
          return (
            <button key={s} disabled={full} onClick={() => setSlot(s)} style={{ minHeight: 56, borderRadius: RAD,
              border: slot === s ? `2px solid ${T.brandDeep}` : `1px solid ${T.border}`,
              background: full ? T.sunken : slot === s ? T.brandSoft : T.surface, color: full ? T.fgSubtle : T.fg,
              fontSize: 13, fontWeight: 600, cursor: full ? "not-allowed" : "pointer", fontFamily: "inherit", ...tnum }}>

          );
        })}
      </div>
    </Screen>
  );
}

function CardPayScreen({ amount, onPaid }) {
  const [f, setF] = useState({ num: "", name: "", exp: "", cvv: "" });
  const [loading, setLoading] = useState(false);
  const valid = f.num.replace(/\s/g, "").length === 16 && f.name && f.exp.length === 5 && f.cvv.length >= 3;
  const fmtNum = (v) => v.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
  const fmtExp = (v) => { const d = v.replace(/\D/g, "").slice(0, 4); return d.length > 2 ? d.slice(0, 2) + "/" + d.slice(2) : d; };
  return (
    <Screen>
      <Card tone="brand" style={{ marginBottom: 16, textAlign: "center" }}>
        <div style={{ fontSize: 13, color: T.fgMuted }}>Amount to pay</div>
        <div style={{ fontSize: 32, fontWeight: 700, color: T.brandDeep, ...tnum }}>{rupee(amount)}</div>
      </Card>
      <Field label="Card number" value={f.num} onChange={(v) => setF({ ...f, num: fmtNum(v) })} placeholder="4242 4242 4242 4242" numeric />
      <Field label="Cardholder name" value={f.name} onChange={(v) => setF({ ...f, name: v.toUpperCase() })} placeholder="NAME ON CARD" />
      <div style={{ display: "flex", gap: 10 }}>
        <div style={{ flex: 1 }}><Field label="Expiry" value={f.exp} onChange={(v) => setF({ ...f, exp: fmtExp(v) })} placeholder="MM/YY" numeric /></div>
        <div style={{ flex: 1 }}><Field label="CVV" value={f.cvv} onChange={(v) => setF({ ...f, cvv: v.replace(/\D/g, "").slice(0, 4) })} placeholder="•••" numeric /></div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, color: T.success, fontSize: 13, marginBottom: 16 }}>🛡 Secured by 256-bit encryption</div>
      <AccentBtn disabled={!valid || loading} reason="Fill in all card details"
        onClick={() => { setLoading(true); setTimeout(onPaid, 1800); }}>{loading ? "Processing…" : `Pay ${rupee(amount)}`}</AccentBtn>
    </Screen>
  );
}

/* ======================= CONFIRMATION + TIMELINE ======================= */
const TIMELINE = [
  ["CONFIRMED", "Confirmed", "Your booking is confirmed"],
  ["PHLEBO_ASSIGNED", "Phlebotomist assigned", "Akash Kumar will collect your sample"],
  ["ON_THE_WAY", "On the way", "Akash is on the way"],
  ["COLLECTED", "Sample collected", "Your sample has been collected"],
  ["RECEIVED_AT_LAB", "Received at lab", "Your sample reached SBAMI's lab"],
  ["REPORT_READY", "Report ready", "Your report is ready to view"],
];
function statusIndex(s) { return TIMELINE.findIndex((x) => x[0] === s); }

function ConfirmScreen({ booking, onAdvance, onReschedule, onCancel, onViewReport }) {
  const idx = statusIndex(booking.status);
  const payCard = {
    PAID_ONLINE: ["success", `Payment confirmed — ${rupee(booking.amount)}`],
    PAY_ON_COLLECTION: ["warning", `${rupee(booking.amount)} to be paid at your door`],
    PRE_BILLED: ["success", `Already paid at the hospital`],
  }[booking.paymentState] || ["success", "Confirmed"];
  return (
    <Screen>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}><Logo size={24} />
        <span style={{ fontSize: 13, fontWeight: 600, color: T.brandDeep }}>Action Medical Institute</span></div>
      <div style={{ fontSize: 26, fontWeight: 700, color: T.brandDeep, ...tnum }}>{booking.code}</div>
      <div style={{ color: T.fgMuted, fontSize: 14, marginBottom: 4 }}>{booking.patientName} · {booking.dateLabel} · {booking.slot}</div>
      <div style={{ fontSize: 13, color: T.fgMuted, marginBottom: 14 }}><b>{booking.landmark}</b>, {booking.address}</div>

      <Card tone={payCard[0]} style={{ marginBottom: 16 }}>
        <div style={{ fontWeight: 600, color: T.fg, ...tnum }}>{payCard[1]}</div>
      </Card>

      {booking.status === "RESCHEDULE_PENDING_PATIENT" && (
        <Card tone="accent" style={{ marginBottom: 16 }}>
          <div style={{ fontWeight: 600, color: T.fg }}>Akash needs to move your visit</div>
          <div style={{ fontSize: 13, color: T.fgMuted, margin: "4px 0 10px" }}>Proposed: {booking.slot}. Reason: an emergency collection.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <AccentBtn onClick={() => onAdvance("CONFIRMED")}>Accept new slot</AccentBtn>
          </div>
        </Card>
      )}

      {/* timeline */}
      <Card style={{ marginBottom: 16 }}>
        {TIMELINE.map((t, i) => {
          const done = i < idx, current = i === idx;
          return (
            <div key={t[0]} style={{ display: "flex", gap: 12, alignItems: "flex-start", paddingBottom: i < TIMELINE.length - 1 ? 16 : 0, position: "relative" }}>
              {i < TIMELINE.length - 1 && <div style={{ position: "absolute", left: 9, top: 20, bottom: 0, width: 2, background: done ? T.success : T.border }} />}
              <div style={{ width: 20, height: 20, borderRadius: 999, flexShrink: 0, zIndex: 1,
                background: done ? T.success : current ? T.brand : T.surface,
                border: done || current ? "none" : `2px solid ${T.fgSubtle}`,
                display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 12 }}>{done ? "✓" : ""}</div>
              <div>
                <div style={{ fontWeight: current ? 700 : 600, color: done || current ? T.fg : T.fgSubtle, fontSize: 14 }}>{t[1]}</div>
                <div style={{ fontSize: 12, color: T.fgMuted }}>{t[2]}</div>
                {current && i === 2 && (
                  <div style={{ marginTop: 8, height: 90, borderRadius: 12, background: `linear-gradient(135deg,${T.brandSoft},${T.infoSoft})`,
                    display: "flex", alignItems: "center", justifyContent: "center", color: T.brandDeep, fontWeight: 600, position: "relative" }}>
                    🚗 Akash is 12 minutes away
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </Card>

      {/* demo advance */}
      {idx >= 0 && idx < TIMELINE.length - 1 && (
        <div style={{ marginBottom: 12 }}>
          <PrimaryBtn onClick={() => onAdvance(TIMELINE[idx + 1][0])}>▶ Advance status (demo): {TIMELINE[idx + 1][1]}</PrimaryBtn>
        </div>
      )}
      {booking.status === "REPORT_READY" && <div style={{ marginBottom: 12 }}><AccentBtn onClick={onViewReport}>View report</AccentBtn></div>}

      {idx < 3 && booking.status !== "RESCHEDULE_PENDING_PATIENT" && (
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><OutlineBtn onClick={onReschedule}>Reschedule</OutlineBtn></div>
          <div style={{ flex: 1 }}><OutlineBtn color={T.error} text={T.error} onClick={onCancel}>Cancel</OutlineBtn></div>
        </div>
      )}
    </Screen>
  );
}

function PhleboToday({ allVisits, selectedDay, onSelectDay, onOpen }) {
  const visits = allVisits.filter((v) => v.day === selectedDay);
  const isToday = selectedDay === 0;
  const priority = visits.filter((v) => v.priority && v.status !== "HANDED_OVER");
  const pending = visits.filter((v) => !v.priority && v.status !== "COLLECTED" && v.status !== "HANDED_OVER");
  const done = visits.filter((v) => v.status === "COLLECTED" || v.status === "HANDED_OVER");
  const toCollect = visits.filter((v) => v.pay === "TO_COLLECT").reduce((s, v) => s + v.amount, 0);
  const countFor = (day) => allVisits.filter((v) => v.day === day).length;

  return (
    <Screen>
      <DaySelector selectedDay={selectedDay} onSelectDay={onSelectDay} countFor={countFor} />

      <Card style={{ marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between" }}>
          <div><div style={{ fontSize: 24, fontWeight: 700, color: T.fg }}>{visits.length}</div><div style={{ fontSize: 12, color: T.fgMuted }}>visits {isToday ? "today" : SCHEDULE_DAYS.find(d => d.key === selectedDay).label.toLowerCase()}</div></div>
          <div style={{ textAlign: "right" }}><div style={{ fontSize: 24, fontWeight: 700, color: T.warning, ...tnum }}>{rupee(toCollect)}</div><div style={{ fontSize: 12, color: T.fgMuted }}>to collect</div></div>
        </div>
      </Card>

      {!isToday && (
        <Card tone="info" style={{ marginBottom: 14, fontSize: 13, color: T.fg }}>
          📅 This is your upcoming schedule. Visit actions (start, collect, handover) unlock on the day itself.
        </Card>
      )}

      {isToday ? (
        <>
          {priority.length > 0 && <>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.error, textTransform: "uppercase", marginBottom: 8 }}>⚠ Priority</div>
            {priority.map((v) => <VisitCard key={v.id} v={v} onOpen={onOpen} />)}
          </>}
          <div style={{ fontSize: 12, fontWeight: 700, color: T.fgMuted, textTransform: "uppercase", margin: "6px 0 8px" }}>Visits</div>
          {pending.map((v) => <VisitCard key={v.id} v={v} onOpen={onOpen} />)}
          {done.length > 0 && <>
            <div style={{ fontSize: 12, fontWeight: 700, color: T.success, textTransform: "uppercase", margin: "10px 0 8px" }}>✓ Done</div>
            {done.map((v) => <Card key={v.id} style={{ marginBottom: 8, opacity: 0.7 }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.fg, fontWeight: 600 }}>{v.patient}</span><Pill tone="success">{v.status === "HANDED_OVER" ? "✓ Handed over" : "Collected"}</Pill></div></Card>)}
          </>}
        </>
      ) : (
        <>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.fgMuted, textTransform: "uppercase", margin: "6px 0 8px" }}>Scheduled visits</div>
          {visits.length === 0 && <Card style={{ textAlign: "center", color: T.fgMuted }}>Nothing scheduled yet for this day.</Card>}
          {visits.map((v) => <ScheduledVisitCard key={v.id} v={v} onOpen={onOpen} />)}

  );
}

/* ---------- COLLECT (vial checklist + payment gate) ---------- */
function PhleboCollect({ v, onDone }) {
  const [checked, setChecked] = useState({});
  const [paid, setPaid] = useState(v.pay !== "TO_COLLECT");
  const [showQr, setShowQr] = useState(false);
  const allChecked = v.tests.every((_, i) => checked[i]);
  const canComplete = allChecked && paid;
  return (
    <Screen footer={
      <AccentBtn disabled={!canComplete}
        reason={!allChecked ? "Check off every vial" : !paid ? `Collect ${rupee(v.amount)} first` : ""}
        onClick={onDone}>Mark collected</AccentBtn>
    }>
      <Card tone="accent" style={{ marginBottom: 14, textAlign: "center" }}>
        <div style={{ fontSize: 12, color: T.fgMuted }}>Write on every vial</div>
        <div style={{ fontSize: 30, fontWeight: 800, color: T.accentStrong, letterSpacing: 4, ...tnum }}>{v.visitCode}</div>
      </Card>

      <div style={{ fontSize: 12, fontWeight: 700, color: T.fgMuted, textTransform: "uppercase", marginBottom: 8 }}>Vial checklist</div>
      {v.tests.map((t, i) => (
        <Card key={i} onClick={() => setChecked({ ...checked, [i]: !checked[i] })} style={{ marginBottom: 8,
          display: "flex", alignItems: "center", gap: 12, border: checked[i] ? `2px solid ${T.success}` : `1px solid ${T.border}` }}>
          <div style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, background: checked[i] ? T.success : T.surface,
            border: checked[i] ? "none" : `2px solid ${T.fgSubtle}`, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>{checked[i] ? "✓" : ""}</div>
          <div><div style={{ fontWeight: 600, color: T.fg }}>{t.en}</div><div style={{ fontSize: 12, color: T.fgMuted }}>{t.vial} · {t.n} vial</div></div>
        </Card>
      ))}

      {/* payment gate */}
      <div style={{ fontSize: 12, fontWeight: 700, color: T.fgMuted, textTransform: "uppercase", margin: "14px 0 8px" }}>Payment</div>
      {paid ? (
        <Card tone="success"><div style={{ fontWeight: 600, color: T.fg }}>✓ {payChip(v.pay)[1]} · {rupee(v.amount)}</div></Card>
      ) : (
        <Card tone="warning">
          <div style={{ fontWeight: 600, color: T.fg, marginBottom: 10 }}>{rupee(v.amount)} to collect — take payment first</div>
          <button onClick={() => setShowQr(true)} style={{ ...miniBtn(T.brandDeep, "#fff"), width: "100%" }}>Show UPI QR</button>
        </Card>
      )}

      <Sheet open={showQr} onClose={() => setShowQr(false)} title={`Collect ${rupee(v.amount)}`}>
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 160, height: 160, margin: "0 auto 12px", background: "#fff", borderRadius: 12,
            display: "grid", gridTemplateColumns: "repeat(11,1fr)", gap: 1, padding: 8, boxSizing: "border-box" }}>
            {Array.from({ length: 121 }).map((_, i) => <div key={i} style={{ background: (i * 7 + i % 5 + Math.floor(i / 11)) % 3 === 0 ? T.fg : "transparent" }} />)}
          </div>
          <div style={{ fontSize: 13, color: T.fgMuted, marginBottom: 14 }}>Booking-linked QR · {v.code}</div>
          <AccentBtn onClick={() => { setPaid(true); setShowQr(false); }}>Simulate payment received ✓</AccentBtn>
        </div>
      </Sheet>
    </Screen>
  );
}

/* ---------- HANDOVER ---------- */
function PhleboHandover({ visits, onConfirm }) {
  const collected = visits.filter((v) => v.status === "COLLECTED");
  const [ticked, setTicked] = useState({});
  const [justDone, setJustDone] = useState(null); // { names, code } snapshot shown after confirming
  const allVials = collected.flatMap((v) => v.tests.map((t, i) => `${v.id}-${i}`));
  const allTicked = allVials.length > 0 && allVials.every((k) => ticked[k]);

  const confirm = () => {
    const ids = collected.map((v) => v.id);
    const names = collected.map((v) => v.patient);
    onConfirm(ids);
    setJustDone({ names, count: ids.length });
    setTicked({});
  };

  if (justDone) {
    return (
      <Screen footer={<PrimaryBtn onClick={() => setJustDone(null)}>Back to Handover</PrimaryBtn>}>
        <Card tone="success" style={{ textAlign: "center", padding: 28 }}>
          <div style={{ fontSize: 40 }}>✅</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.fg, marginTop: 8 }}>Handover complete</div>
          <div style={{ fontSize: 13, color: T.fgMuted, marginTop: 4 }}>
            {justDone.count} visit{justDone.count > 1 ? "s" : ""} handed over to Collection Room
          </div>
        </Card>
        <div style={{ fontSize: 12, fontWeight: 700, color: T.fgMuted, textTransform: "uppercase", margin: "16px 0 8px" }}>Handed over</div>
        {justDone.names.map((n, i) => (

  }

  return (
    <Screen footer={

        <AccentBtn disabled={!allTicked} reason="Tick every vial" onClick={confirm}>Confirm handover to Collection Room</AccentBtn>

      {collected.length === 0 ? (
        <Card style={{ textAlign: "center", color: T.fgMuted }}>Collect samples first — they'll appear here for handover.</Card>
      ) : (
        <>
          <div style={{ fontSize: 13, color: T.fgMuted, marginBottom: 12 }}>{collected.length} visit{collected.length > 1 ? "s" : ""} · read aloud and tick each vial with Collection Room staff.</div>
          {collected.map((v) => (
            <Card key={v.id} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontWeight: 600, color: T.fg }}>{v.patient}</div>
                <span style={{ fontWeight: 800, color: T.accentStrong, letterSpacing: 2, ...tnum }}>{v.visitCode}</span>
              </div>
              {v.tests.map((t, i) => {
                const key = `${v.id}-${i}`;
                return (
                  <div key={i} onClick={() => setTicked({ ...ticked, [key]: !ticked[key] })}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", cursor: "pointer" }}>
                    <div style={{ width: 20, height: 20, borderRadius: 5, background: ticked[key] ? T.success : T.surface,

          ))}
        </>
      )}
    </Screen>
  );
}

function PhleboApp({ onSignOut }) {
  const [tab, setTab] = useState("today");
  const [visits, setVisits] = useState(SEED_VISITS);
  const [selectedDay, setSelectedDay] = useState(0);
  const [openId, setOpenId] = useState(null);
  const [mode, setMode] = useState(null); // 'visit' | 'collect'
  const v = visits.find((x) => x.id === openId);
  const openIsReadOnly = v && v.day !== 0;

  const update = (id, patch) => setVisits((vs) => vs.map((x) => x.id === id ? { ...x, ...patch } : x));

  let body, header;
  if (mode === "collect" && v) {
    header = <PhleboHeader title="Collect Sample" />;
    body = <PhleboCollect v={v} onDone={() => { update(v.id, { status: "COLLECTED" }); setMode(null); setOpenId(null); setTab("today"); }} />;
  } else if (mode === "visit" && v) {
    header = <PhleboHeader title={openIsReadOnly ? "Scheduled Visit" : "Visit"} />;
    body = <PhleboVisit v={v} readOnly={openIsReadOnly}
      onStart={() => update(v.id, { status: "ON_THE_WAY" })}
      onReached={() => update(v.id, { status: "REACHED", visitCode: genVisitCode() })}
      onCollect={() => setMode("collect")}
      onBack={() => { setMode(null); setOpenId(null); }} />;
  } else {
    const titles = { today: "My Schedule", queue: "Rx Queue", handover: "Handover", me: "Me" };
    header = <PhleboHeader title={titles[tab]} />;
    body = tab === "today" ? <PhleboToday allVisits={visits} selectedDay={selectedDay} onSelectDay={setSelectedDay} onOpen={(id) => { setOpenId(id); setMode("visit"); }} />
      : tab === "queue" ? <PhleboQueue queue={SEED_RXQUEUE} />
      : tab === "handover" ? <PhleboHandover visits={visits} onConfirm={(ids) => setVisits((vs) => vs.map((x) => ids.includes(x.id) ? { ...x, status: "HANDED_OVER" } : x))} />
      : <PhleboMe visits={visits.filter((x) => x.day === 0)} onSignOut={onSignOut} />;
  }

  return (
    <Phone>
      {header}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{body}</div>
      {!mode && <PhleboNav tab={tab} onTab={setTab} queueCount={SEED_RXQUEUE.length} />}
    </Phone>
  );
}


function PatientApp({ onStaffLogin }) {
  const [lang, setLang] = useState("en");
  const langVal = useMemo(() => ({
    lang, t: (k) => (STR[lang][k] ?? STR.en[k] ?? k),
    toggle: () => setLang((l) => (l === "en" ? "hi" : "en")),
  }), [lang]);

  const [screen, setScreenRaw] = useState("login"); // route
  const [history, setHistory] = useState([]); // stack of previous screens
  const [tab, setTab] = useState("home");
  const [drawer, setDrawer] = useState(false);
  const [patients, setPatients] = useState([]); // empty until login resolves: fetched (existing) or registered (new)
  const [reports] = useState(SEED_REPORTS);
  const [bookings, setBookings] = useState([]);

  // booking-in-progress
  const [flowPatient, setFlowPatient] = useState(null);
  const [cart, setCart] = useState([]);
  const [draft, setDraft] = useState({});
  const [activeBookingId, setActiveBookingId] = useState(null);
  const [activeReport, setActiveReport] = useState(null);
  const [addingFromDrawer, setAddingFromDrawer] = useState(false);
  const [firstTimeSetup, setFirstTimeSetup] = useState(false); // true = registering the very first patient on a brand-new account
  const [pendingPatient, setPendingPatient] = useState(null);
  const [sheet, setSheet] = useState(null); // 'reschedule' | 'cancel'

  const activeBooking = bookings.find((b) => b.id === activeBookingId);
  const flowTotal = cart.reduce((s, c) => s + c.price, 0);

  // navigate: push current screen to history, then switch. Screens that shouldn't
  // be returned to (login, consent gates, confirmation) don't get a back button.
  const NO_BACK = ["login", "consent", "newConsent", "app", "confirm"];
  const setScreen = (next) => { setHistory((h) => [...h, screen]); setScreenRaw(next); };
  const goBack = () => {
    setHistory((h) => {
      if (h.length === 0) { setScreenRaw("app"); return h; }
      const prev = h[h.length - 1];
      setScreenRaw(prev);
      return h.slice(0, -1);
    });
  };
  const canGoBack = history.length > 0 && !NO_BACK.includes(screen);

  const goHome = () => { setTab("home"); setScreenRaw("app"); setHistory([]); setSheet(null); };
  const resetFlow = () => { setFlowPatient(null); setCart([]); setDraft({}); };

  /* ----- onboarding ----- */
  if (screen === "login") return wrap(<LoginScreen
    onStaff={() => onStaffLogin()}
    onDone={(existing) => {
      setHistory([]); // OTP is already verified — never let back navigation return to login
      if (existing) {
        // SCENARIO 1 — patient record found for this mobile number: simulate the Akhil fetch
        setPatients(SEED_PATIENTS);
        setScreenRaw("app"); setTab("home");
      } else {
        // SCENARIO 2 — no record for this mobile number: mandatory registration before Home
        setFirstTimeSetup(true);
        setScreenRaw("newPatient");
      }
    }} />);
  if (screen === "newPatient") return wrap(<NewPatientScreen firstTime={firstTimeSetup}
    onCreated={(p) => { setPendingPatient(p); setScreen("newConsent"); }} />,
    firstTimeSetup ? "Welcome to SBAMI" : "Add Patient");
  if (screen === "newConsent") return wrap(<ConsentScreen onAgree={() => {
    setPatients((ps) => [...ps, pendingPatient]);
    if (firstTimeSetup) { setFirstTimeSetup(false); goHome(); }
    else if (addingFromDrawer) { setAddingFromDrawer(false); goHome(); }
    else { setFlowPatient(pendingPatient); setScreen("book_tests"); }
  }} />, "Privacy & Consent");

  /* ----- booking flow ----- */
  if (screen === "book_patient") return chrome("Who is this test for?",
    <PatientSelect patients={patients} onPick={(p) => { setFlowPatient(p); setScreen("book_tests"); }}
      onAdd={() => { setAddingFromDrawer(false); setScreen("newPatient"); }} />, false);

  if (screen === "book_tests") return chrome("Select tests",
    <TestSelect step={0} patient={flowPatient} cart={cart} setCart={setCart} onContinue={() => setScreen("book_schedule")} />, false);

  if (screen === "book_schedule") return chrome("Date & Address",
    <ScheduleScreen step={1} cart={cart} draft={draft} setDraft={setDraft} onContinue={() => setScreen("book_review")} />, false);

  if (screen === "book_review") return chrome("Review Booking",
    <ReviewScreen step={2} patient={flowPatient} cart={cart} draft={draft}
      onEdit={(w) => setScreen(w === "patient" ? "book_patient" : w === "tests" ? "book_tests" : "book_schedule")}
      onPay={() => setScreen("pay_select")} />, false);

  if (screen === "pay_select") return chrome("Payment",
    <PaymentSelect amount={flowTotal}
      onUPI={() => setScreen("pay_upi")} onCard={() => setScreen("pay_card")}
      onCash={() => finalizeBooking("PAY_ON_COLLECTION")} />, false);

  if (screen === "pay_upi") return chrome("Pay via UPI",
    <UpiPayScreen amount={flowTotal} bookingCode={"SB-" + (1000 + bookings.length)} onPaid={() => finalizeBooking("PAID_ONLINE")} />, false);

  if (screen === "pay_card") return chrome("Card Payment",
    <CardPayScreen amount={flowTotal} onPaid={() => finalizeBooking("PAID_ONLINE")} />, false);

  if (screen === "confirm" && activeBooking) return chrome(activeBooking.justBooked ? "Booking Confirmed" : "Your Booking",
    <ConfirmScreen booking={activeBooking}
      onAdvance={(st) => setBookings((bs) => bs.map((b) => b.id === activeBooking.id ? { ...b, status: st, justBooked: false } : b))}
      onReschedule={() => setSheet("reschedule")} onCancel={() => setSheet("cancel")}
      onViewReport={() => { setActiveReport(reports[0]); setScreen("report"); }} />, false, true);

  if (screen === "report" && activeReport) return chrome("Report",
    <ReportViewer report={activeReport} patient={patients.find((p) => p.id === activeReport.patientId)} />, false);

  /* ----- main app (tabbed) ----- */
  return wrapApp();

  /* ---------- helpers below (closures) ---------- */
  function finalizeBooking(paymentState) {
    const b = {
      id: "b" + uid(), code: "SB-" + (1000 + bookings.length), patientName: flowPatient.name,
      tests: cart, amount: flowTotal, dateLabel: draft.dateLabel, slot: draft.slot,
      address: draft.address, landmark: draft.landmark, status: "CONFIRMED",
      paymentState, justBooked: true, visitCode: genVisitCode(),
    };
    setBookings((bs) => [...bs, b]);
    setActiveBookingId(b.id);
    resetFlow();
    setScreen("confirm");
  }

  function wrap(node, title) {
    return (
      <LangCtx.Provider value={langVal}>
        <Phone>
          {title && <Header title={title} onBack={goBack} canBack={canGoBack}
            onHome={() => { resetFlow(); goHome(); }} onProfile={() => setDrawer(true)} />}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{node}</div>
          <ProfileDrawer open={drawer} onClose={() => setDrawer(false)} patients={patients}
            onAddPatient={() => { setDrawer(false); setAddingFromDrawer(true); setScreen("newPatient"); }}
            onSignOut={() => { setDrawer(false); setScreenRaw("login"); setHistory([]); }} />
        </Phone>
      </LangCtx.Provider>
    );
  }
  function chrome(title, node, showLogo, isConfirm) {
    return (
      <LangCtx.Provider value={langVal}>
        <Phone>
          <Header title={title} showLogo={showLogo}
            onBack={goBack} canBack={canGoBack}
            onHome={() => { resetFlow(); goHome(); }} onProfile={() => setDrawer(true)} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{node}</div>
          <ProfileDrawer open={drawer} onClose={() => setDrawer(false)} patients={patients}
            onAddPatient={() => { setDrawer(false); setAddingFromDrawer(true); setScreen("newPatient"); }}
            onSignOut={() => { setDrawer(false); setScreen("login"); }} />
          {renderSheets()}
        </Phone>
      </LangCtx.Provider>
    );
  }
  function wrapApp() {
    const body = tab === "home"
      ? <HomeScreen patients={patients} bookings={bookings} reports={reports}
          onBook={() => setScreen("book_patient")}
          onOpenBooking={(id) => { setActiveBookingId(id); setScreen("confirm"); }}
          onOpenReports={() => setTab("reports")} />
      : tab === "bookings"
      ? <BookingsTab bookings={bookings} onOpen={(id) => { setActiveBookingId(id); setScreen("confirm"); }} />
      : tab === "reports"
      ? <ReportsScreen patients={patients} reports={reports} onOpen={(r) => { setActiveReport(r); setScreen("report"); }} />
      : <ProfileTab patients={patients} onAdd={() => { setAddingFromDrawer(true); setScreen("newPatient"); }} onSignOut={() => setScreen("login")} />;
    return (
      <LangCtx.Provider value={langVal}>
        <Phone>
          <Header title={tab === "home" ? "Sri Balaji AMI" : tab[0].toUpperCase() + tab.slice(1)} showLogo={tab === "home"}
            onHome={goHome} onProfile={() => setDrawer(true)} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>{body}</div>
          <BottomNav tab={tab} onTab={setTab} />
          <ProfileDrawer open={drawer} onClose={() => setDrawer(false)} patients={patients}
            onAddPatient={() => { setDrawer(false); setAddingFromDrawer(true); setScreen("newPatient"); }}
            onSignOut={() => { setDrawer(false); setScreen("login"); }} />
        </Phone>
      </LangCtx.Provider>
    );
  }
  function renderSheets() {
    return (
      <>
        <Sheet open={sheet === "reschedule"} onClose={() => setSheet(null)} title="Pick a new date & time">
          <RescheduleBody onConfirm={() => {
            setBookings((bs) => bs.map((b) => b.id === activeBookingId ? { ...b, status: "CONFIRMED" } : b));
            setSheet(null);
          }} />
        </Sheet>
        <Sheet open={sheet === "cancel"} onClose={() => setSheet(null)} title="Cancel booking?">
          <Card tone="neutral" style={{ marginBottom: 14, background: T.sunken }}>
            <Row l="Paid total" r={rupee(activeBooking?.amount || 0)} />
            <Row l="Cancellation charge" r="₹0 (Free)" c={T.success} />
            <div style={{ borderTop: `1px solid ${T.border}`, margin: "8px 0" }} />
            <Row l="Refund amount" r={rupee(activeBooking?.amount || 0)} bold c={T.brandDeep} />
          </Card>
          <div style={{ marginBottom: 10 }}><AccentBtn onClick={() => setSheet(null)}>Keep my booking</AccentBtn></div>
          <OutlineBtn color={T.error} text={T.error} onClick={() => {
            setBookings((bs) => bs.map((b) => b.id === activeBookingId ? { ...b, status: "CANCELLED" } : b));
            setSheet(null); goHome();
          }}>Yes, cancel booking</OutlineBtn>
        </Sheet>
      </>
    );
  }
}

        display: "flex", flexDirection: "column", position: "relative", boxShadow: "0 12px 48px rgba(0,0,0,0.25)", border: "8px solid #0f1720" }}>
        <div style={{ height: 26, background: T.bg, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 18px", fontSize: 12, color: T.fg, fontWeight: 600, ...tnum }}>
          <span>9:41</span><span>SBAMI</span><span>▂▄ 100%</span>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ======================= TOP-LEVEL APP (role switch) ======================= */
function App() {
  const [role, setRole] = useState(BOOT_ROLE || "patient");
  const [phleboLoggedIn, setPhleboLoggedIn] = useState(false);
  if (role === "phlebo") {
    return (
      <PhleboAppRoot
        loggedIn={phleboLoggedIn}
        onLoggedIn={() => setPhleboLoggedIn(true)}
        onSignOut={() => setPhleboLoggedIn(false)}
        onBackToPatient={() => { setRole("patient"); setPhleboLoggedIn(false); }}
      />
    );
  }
  return <PatientApp onStaffLogin={() => setRole("phlebo")} />;
}

/* Phlebo needs its own language context instance (it manages lang internally via useLang in PhleboHeader).
   Sign-out drops phleboLoggedIn back to false, returning to the phlebo login screen — not the patient app. */
function PhleboAppRoot({ loggedIn, onLoggedIn, onSignOut, onBackToPatient }) {
  const [lang, setLang] = useState("en");
  const langVal = useMemo(() => ({
    lang, t: (k) => (STR[lang][k] ?? STR.en[k] ?? k),
    toggle: () => setLang((l) => (l === "en" ? "hi" : "en")),
  }), [lang]);
  return (
    <LangCtx.Provider value={langVal}>
      {loggedIn
        ? <PhleboApp onSignOut={onSignOut} />
        : <PhleboLoginScreen onDone={onLoggedIn} onBackToPatient={BOOT_ROLE === "phlebo" ? null : onBackToPatient} />}
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>

<script>
(function () {
  function showError(err) {
    var loading = document.getElementById('boot-loading');
    if (loading) loading.style.display = 'none';
    var box = document.getElementById('boot-error');
    var detail = document.getElementById('boot-error-detail');
    if (box) box.style.display = 'flex';
    if (detail) detail.textContent = (err && (err.stack || err.message)) ? (err.stack || err.message) : String(err);
    console.error('SBAMI demo boot error:', err);
  }
  window.addEventListener('error', function (e) { showError(e.error || e.message); });
  try {
    if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
      throw new Error('React failed to load from the CDN — check your internet connection and reload.');
    }
    if (typeof Babel === 'undefined') {
      throw new Error('Babel standalone failed to load from the CDN — check your internet connection and reload.');
    }
    window.BOOT_SCENARIO = "new";
    var srcEl = document.getElementById('app-source');
    var src = srcEl.textContent;
    var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
    var run = new Function("React", "ReactDOM", out);
    run(React, ReactDOM);
  } catch (err) {
    showError(err);
  }
})();
</script>
